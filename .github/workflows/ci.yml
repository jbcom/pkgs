name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: withastro/action@44706356b4eb735f8b9035699eb4796241a040c4 # v6.1.0
        with:
          node-version: "24"
          package-manager: pnpm@latest
