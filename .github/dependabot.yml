version: 2
updates:
  # Keep GitHub Actions pinned SHAs fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Keep site dependencies (Astro, Vue, Tailwind, etc.) current.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      astro-stack:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "vue"
          - "@vue/*"
          - "vite-plugin-*"
          - "astro-*"
        update-types:
          - minor
          - patch
      type-defs:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
      minor-patch:
        update-types:
          - minor
          - patch
