<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jbcom/pkgs</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 2rem auto;
        max-width: 56rem;
        padding: 0 1rem;
        line-height: 1.5;
      }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .card {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 0.75rem;
        padding: 1rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>jbcom/pkgs</h1>
    <p>Unified package repository for Homebrew, Scoop, and Chocolatey.</p>

    <div class="card">
      <h2>Homebrew tap</h2>
      <p>Formulae live in <code>/Formula</code>.</p>
    </div>

    <div class="card">
      <h2>Scoop bucket</h2>
      <p>Manifests live in <code>/bucket</code>.</p>
    </div>

    <div class="card">
      <h2>Chocolatey</h2>
      <p>Metadata lives in <code>/choco</code>.</p>
    </div>

    <p>Source: <a href="https://github.com/jbcom/pkgs">github.com/jbcom/pkgs</a></p>
  </body>
</html>
